<div class="min-h-screen flex flex-col">
  <header class="sticky top-0 z-30 surface border-b">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <a routerLink="/" class="flex items-center gap-3 group">
        <span class="font-display text-3xl bg-gradient-to-br from-rose-500 via-rose-600 to-red-700 bg-clip-text text-transparent leading-none">日本語</span>
        <div class="hidden sm:flex flex-col leading-tight">
          <span class="text-sm font-semibold tracking-wide text-zinc-800 dark:text-zinc-100 group-hover:text-rose-600 transition-colors">Nihongo</span>
          <span class="text-[11px] uppercase tracking-widest text-zinc-500 dark:text-zinc-500">Japonais en situation</span>
        </div>
      </a>

      <nav class="flex items-center gap-1 sm:gap-2 text-sm">
        <a routerLink="/" routerLinkActive="bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-300" [routerLinkActiveOptions]="{ exact: true }"
           class="px-3 py-2 rounded-xl font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 transition-colors">
          Accueil
        </a>
        <a routerLink="/progress" routerLinkActive="bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-300"
           class="px-3 py-2 rounded-xl font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 transition-colors">
          Progression
        </a>

        <button (click)="theme.cycle()"
                [attr.aria-label]="'Changer de thème (actuel : ' + modeLabel() + ')'"
                [attr.title]="'Thème : ' + modeLabel()"
                class="ml-1 inline-flex items-center gap-1.5 px-3 py-2 rounded-xl font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 transition-colors">
          <span class="text-base leading-none">{{ modeIcon() }}</span>
          <span class="hidden sm:inline text-xs">{{ modeLabel() }}</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto px-4 sm:px-6 py-8 sm:py-12 animate-fade-up">
    <router-outlet />
  </main>

  <footer class="border-t border-zinc-200/60 dark:border-zinc-800/60 py-6 text-center text-xs text-zinc-500 dark:text-zinc-500">
    <p>Apprends le japonais en situation · Tailwind & Angular</p>
  </footer>
</div>
