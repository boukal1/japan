<div class="min-h-screen flex flex-col">
  <header class="sticky top-0 z-30 backdrop-blur bg-white/70 dark:bg-zinc-950/70 border-b border-zinc-200/60 dark:border-zinc-800/60">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <a routerLink="/" class="flex items-center gap-3 group">
        <span class="font-jp text-2xl font-bold bg-gradient-to-br from-rose-500 to-red-700 bg-clip-text text-transparent">日本語</span>
        <span class="hidden sm:inline text-sm font-semibold tracking-wide text-zinc-700 dark:text-zinc-200 group-hover:text-rose-600 transition-colors">Nihongo</span>
      </a>
      <nav class="flex items-center gap-1 sm:gap-2 text-sm">
        <a routerLink="/" routerLinkActive="bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-300" [routerLinkActiveOptions]="{ exact: true }"
           class="px-3 py-2 rounded-lg font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
          Accueil
        </a>
        <a routerLink="/progress" routerLinkActive="bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-300"
           class="px-3 py-2 rounded-lg font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
          Progression
        </a>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <router-outlet />
  </main>

  <footer class="border-t border-zinc-200/60 dark:border-zinc-800/60 py-6 text-center text-xs text-zinc-500">
    <p>500 mots · 10 thèmes · romaji & français — fait avec Angular & Tailwind</p>
  </footer>
</div>
